name: Dev-Event Bot (Git Cache)

on:
  schedule:
    # 매일 09:00 UTC (18:00 KST)
    - cron: '0 0 * * *'
  
  # 수동 실행 버튼
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Ensure cache file exists
        run: |
          test -f events_cache.json || printf '[]\n' > events_cache.json
      
      - name: Run Dev-Event Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python dev_event_bot.py
      
      - name: Commit and push cache
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add events_cache.json
          git diff --cached --quiet && exit 0
          git commit -m "Update events cache"
          git push
        continue-on-error: true
