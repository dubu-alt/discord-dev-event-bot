name: Dev-Event Bot (Git-backed Cache)

on:
  schedule:
    # 매일 09:00 UTC (18:00 KST)
    - cron: '0 0 * * *'
  
  # 수동 실행 버튼
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-event-bot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize git-backed cache
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          cache_path = Path('events_cache.json')
          if not cache_path.exists():
              cache_path.write_text('[]\n', encoding='utf-8')
              raise SystemExit(0)

          try:
              data = json.loads(cache_path.read_text(encoding='utf-8'))
              if not isinstance(data, list):
                  raise ValueError('events_cache.json must contain a JSON array')
          except Exception as exc:
              print(f'Invalid events_cache.json, resetting to []: {exc}')
              cache_path.write_text('[]\n', encoding='utf-8')
          PY
      
      - name: Run Dev-Event Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python dev_event_bot.py
      
      - name: Commit and push git-backed cache
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add events_cache.json
          git diff --cached --quiet && exit 0
          git commit -m "Update events cache"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
        continue-on-error: true
